services:
  ai-ops:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - LLAMA_URL=http://host.docker.internal:8080
      - SERVICE_NAME=llama-8080.service
      - JWT_SECRET=${JWT_SECRET:-ai-ops-secure-jwt-secret-2026}
      - CORS_ORIGIN=http://localhost:8081
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
