name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install backend
        run: cd backend && npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Install frontend
        run: cd frontend && npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Lint backend
        run: cd backend && npx eslint src/

      - name: Test backend
        run: cd backend && npm test

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Test frontend
        run: cd frontend && npm test

  docker-build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-ops:${{ github.sha }} .

      - name: Tag latest
        run: docker tag ai-ops:${{ github.sha }} ai-ops:latest
