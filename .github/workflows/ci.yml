# ai-ops CI Pipeline
# Lint → Test → Build → Security
# Docker + Deploy — coming soon

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Lint & Checks
  # ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: cd ai-ops && npm run install:all

      - name: Lint backend
        run: cd ai-ops/backend && npm run lint

      - name: Lint frontend
        run: cd ai-ops/frontend && npm run lint

      - name: Check for llama-panel remnants
        run: |
          if grep -r "llama-panel\|Llama Panel" --include="*.js" --include="*.jsx" --include="*.json" --include="*.sh" --include="*.html" --include="*.service" --include="*.css" ai-ops/ 2>/dev/null | grep -v node_modules | grep -v package-lock | grep -v frontend/dist | grep -v backups | grep -q .; then
            echo "❌ Found llama-panel remnants!"
            exit 1
          fi
          echo "✅ No llama-panel remnants"

  # ─────────────────────────────────────────────
  # Stage 2: Tests
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: cd ai-ops && npm run install:all

      - name: Backend tests
        run: cd ai-ops/backend && npm test

      - name: Frontend tests (warn-only)
        run: cd ai-ops/frontend && npm test || echo "⚠️ Frontend tests skipped"

  # ─────────────────────────────────────────────
  # Stage 3: Build
  # ─────────────────────────────────────────────
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: cd ai-ops && npm run install:all

      - name: Build frontend
        run: cd ai-ops/frontend && NODE_OPTIONS="--max-old-space-size=4096" npm run build

      - name: Verify build
        run: |
          if [ ! -d ai-ops/frontend/dist ]; then
            echo "❌ Build failed: frontend/dist not found"
            exit 1
          fi
          echo "✅ Build successful"
          du -sh ai-ops/frontend/dist

  # ─────────────────────────────────────────────
  # Stage 4: Security
  # ─────────────────────────────────────────────
  security:
    name: 🔒 Security
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: cd ai-ops && npm run install:all

      - name: npm audit (backend)
        run: cd ai-ops/backend && npm audit --production --audit-level=high 2>&1 || true

      - name: npm audit (frontend)
        run: cd ai-ops/frontend && npm audit --production --audit-level=high 2>&1 || true

      - name: Check for exposed secrets
        run: |
          echo "Checking source files for secrets..."
          if grep -rn "sk-or-v1-[a-zA-Z0-9]\{20,\}" ai-ops/ --include="*.js" --include="*.jsx" --include="*.json" --include="*.env*" --include="*.sh" 2>/dev/null | grep -v node_modules | grep -q .; then
            echo "❌ OpenRouter key found!"
            exit 1
          fi
          if grep -rn "ghp_[a-zA-Z0-9]\{20,\}" ai-ops/ --include="*.js" --include="*.jsx" --include="*.json" --include="*.env*" --include="*.sh" 2>/dev/null | grep -v node_modules | grep -q .; then
            echo "❌ GitHub token found!"
            exit 1
          fi
          echo "✅ No secrets in source files"
