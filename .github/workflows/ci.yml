# ai-ops CI Pipeline
# Triggers: push to main/develop, PR to main
# Jobs: lint → test → build → scan → deploy

name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Lint & Format
  # ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: cd ai-ops && npm run install:all

      - name: Lint backend
        run: cd ai-ops/backend && npm run lint

      - name: Lint frontend
        run: cd ai-ops/frontend && npm run lint

      - name: Check for llama-panel remnants
        run: |
          if grep -r "llama-panel\|Llama Panel" --include="*.js" --include="*.jsx" --include="*.json" --include="*.md" --include="*.yml" --include="*.sh" --include="*.html" --include="*.service" ai-ops/ 2>/dev/null | grep -v node_modules | grep -v package-lock | grep -v frontend/dist | grep -v backups | grep -q .; then
            echo "❌ Found llama-panel remnants!"
            grep -r "llama-panel\|Llama Panel" --include="*.js" --include="*.jsx" --include="*.json" --include="*.md" --include="*.yml" --include="*.sh" --include="*.html" --include="*.service" ai-ops/ 2>/dev/null | grep -v node_modules | grep -v package-lock | grep -v frontend/dist | grep -v backups
            exit 1
          fi
          echo "✅ No llama-panel remnants found"

  # ─────────────────────────────────────────────
  # Stage 2: Tests
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: cd ai-ops && npm run install:all

      - name: Backend tests
        run: cd ai-ops/backend && npm test

      - name: Frontend tests
        run: cd ai-ops/frontend && npm test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: ./ai-ops/frontend/coverage
          fail_ci_if_error: false

  # ─────────────────────────────────────────────
  # Stage 3: Build
  # ─────────────────────────────────────────────
  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: cd ai-ops && npm run install:all

      - name: Build frontend
        run: cd ai-ops/frontend && npm run build

      - name: Verify build
        run: |
          if [ ! -d ai-ops/frontend/dist ]; then
            echo "❌ Build failed: frontend/dist not found"
            exit 1
          fi
          echo "✅ Build successful"
          du -sh ai-ops/frontend/dist

  # ─────────────────────────────────────────────
  # Stage 4: Security Scan
  # ─────────────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: cd ai-ops && npm run install:all

      - name: Scan for vulnerabilities (backend)
        run: |
          cd ai-ops/backend
          npm audit --production --audit-level=high 2>&1 || true

      - name: Scan for vulnerabilities (frontend)
        run: |
          cd ai-ops/frontend
          npm audit --production --audit-level=high 2>&1 || true

      - name: Check for secrets (trufflehog)
        uses: trufflesecurity/trufflehog@v3.82.1
        with:
          extra_args: --only-failed --fail --branch=main

  # ─────────────────────────────────────────────
  # Stage 5: Docker Build
  # ─────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./ai-ops
          file: ./ai-ops/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

  # ─────────────────────────────────────────────
  # Stage 6: Deploy (main branch only)
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /home/den/.openclaw/workspace/ai-ops

            # Pull latest
            git pull origin main

            # Build frontend
            npm run install:all
            cd frontend && npm run build

            # Restart service
            sudo systemctl restart ai-ops

            # Verify health
            sleep 3
            curl -sf http://localhost:8081/health || exit 1
            echo "✅ Deploy successful"
